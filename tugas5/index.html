<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produk dengan Filter</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <!-- Header -->
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold text-primary">Toko Online</h1>
            <p class="lead">Temukan produk terbaik untuk Anda</p>
        </div>

        <!-- Filter Buttons -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="btn-group w-100" role="group">
                    <button class="btn btn-outline-primary active filter-btn" data-kategori="semua">
                        Semua <i class="bi bi-grid-3x3-gap"></i>
                    </button>
                    <button class="btn btn-outline-primary filter-btn active" data-kategori="elektronik">
                        Elektronik <span class="badge bg-primary ms-1">3</span>
                    </button>
                    <button class="btn btn-outline-primary filter-btn" data-kategori="pakaian">
                        Pakaian <span class="badge bg-primary ms-1">3</span>
                    </button>
                    <button class="btn btn-outline-primary filter-btn" data-kategori="aksesoris">
                        Aksesoris <span class="badge bg-primary ms-1">3</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Produk Grid -->
        <div class="row g-4" id="produk-container">
            <!-- Produk akan dimuat oleh JavaScript -->
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script>
        // Data produk
        const produkData = [
            {
                id: 1,
                nama: "Smartphone Galaxy S23",
                harga: 12999000,
                deskripsi: "Smartphone flagship dengan kamera 200MP, prosesor Snapdragon 8 Gen 2, dan layar AMOLED 6.1 inci.",
                gambar: "https://www.androidauthority.com/wp-content/uploads/2023/01/Samsung-Galaxy-S23-back-green-colorway-in-hand.jpg",
                kategori: "elektronik"
            },
            {
                id: 2,
                nama: "Laptop MacBook Air M2",
                harga: 18999000,
                deskripsi: "Laptop ringan dengan chip M2, RAM 16GB, SSD 512GB, dan baterai tahan hingga 18 jam.",
                gambar: "https://cdn.mos.cms.futurecdn.net/ftDV5jz4RD7WdUeaVuRadb.jpg",
                kategori: "elektronik"
            },
            {
                id: 3,
                nama: "Smartwatch Apple Watch 9",
                harga: 6999000,
                deskripsi: "Smartwatch premium dengan sensor kesehatan lengkap, GPS, dan baterai 36 jam.",
                gambar: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&h=400&fit=crop",
                kategori: "elektronik"
            },
            {
                id: 4,
                nama: "Kaos Polos Premium",
                harga: 159000,
                deskripsi: "Kaos cotton combed 30s premium, nyaman dipakai sehari-hari, berbagai warna tersedia.",
                gambar: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&h=400&fit=crop",
                kategori: "pakaian"
            },
            {
                id: 5,
                nama: "Celana Jeans Slim Fit",
                harga: 349000,
                deskripsi: "Celana jeans slim fit dengan bahan stretch, tahan lama dan stylish untuk berbagai occasion.",
                gambar: "https://images.unsplash.com/photo-1542272604-787c3835535d?w=400&h=400&fit=crop",
                kategori: "pakaian"
            },
            {
                id: 6,
                nama: "Jaket Bomber",
                harga: 499000,
                deskripsi: "Jaket bomber dengan bahan parasut berkualitas, ringan dan hangat untuk musim dingin.",
                gambar: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400&h=400&fit=crop",
                kategori: "pakaian"
            },
            {
                id: 7,
                nama: "Tas Ransel Laptop",
                harga: 299000,
                deskripsi: "Tas ransel multifungsi untuk laptop 15 inci, anti air dengan banyak kompartemen.",
                gambar: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400&h=400&fit=crop",
                kategori: "aksesoris"
            },
            {
                id: 8,
                nama: "Kacamata Hitam Polarized",
                harga: 249000,
                deskripsi: "Kacamata hitam dengan lensa polarized UV400, frame ringan dan anti gores.",
                gambar: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&h=400&fit=crop",
                kategori: "aksesoris"
            },
            {
                id: 9,
                nama: "Dompet Kulit Asli",
                harga: 399000,
                deskripsi: "Dompet kulit asli handmade, 12 slot kartu, 2 slot uang kertas, dan resleting aman.",
                gambar: "https://down-id.img.susercontent.com/file/id-11134207-7r98o-ll1l0oq3gt94bc",
                kategori: "aksesoris"
            }
        ];

        // Format harga ke Rupiah
        function formatRupiah(angka) {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(angka);
        }

        // Render produk
        function renderProduk(produkList) {
            const container = document.getElementById('produk-container');
            container.innerHTML = '';

            produkList.forEach(produk => {
                const card = `
                    <div class="col-lg-4 col-md-6">
                        <div class="card h-100 shadow-sm hover-shadow">
                            <img src="${produk.gambar}" class="card-img-top" alt="${produk.nama}" 
                                 style="height: 250px; object-fit: cover;">
                            <div class="card-body d-flex flex-column">
                                <span class="badge bg-success mb-2 kategori-badge" data-kategori="${produk.kategori}">
                                    ${produk.kategori.charAt(0).toUpperCase() + produk.kategori.slice(1)}
                                </span>
                                <h5 class="card-title fw-bold">${produk.nama}</h5>
                                <p class="card-text flex-grow-1">${produk.deskripsi}</p>
                                <div class="mt-auto">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <h4 class="text-primary mb-0">${formatRupiah(produk.harga)}</h4>
                                        <button class="btn btn-primary btn-lg">
                                            <i class="bi bi-cart-plus me-1"></i>Beli
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Filter produk
        function filterProduk(kategori) {
            const filteredProduk = kategori === 'semua' 
                ? produkData 
                : produkData.filter(produk => produk.kategori === kategori);
            
            renderProduk(filteredProduk);
        }

        // Event listener untuk filter buttons
        document.addEventListener('DOMContentLoaded', function() {
            // Render semua produk pertama kali
            renderProduk(produkData);

            // Filter functionality
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const kategori = this.dataset.kategori;
                    
                    // Update active button
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    filterProduk(kategori);
                });
            });

            // Hover effect untuk cards
            document.addEventListener('mouseenter', '.card', function() {
                this.style.transform = 'translateY(-5px)';
                this.style.transition = 'all 0.3s ease';
            }, true);

            document.addEventListener('mouseleave', '.card', function() {
                this.style.transform = 'translateY(0)';
            }, true);
        });
    </script>

    <style>
        .hover-shadow {
            transition: all 0.3s ease;
        }
        .hover-shadow:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.1) !important;
            transform: translateY(-5px);
        }
        .kategori-badge {
            font-size: 0.8em;
            width: fit-content;
        }
        .btn-group .btn {
            border-radius: 0;
        }
        .btn-group .btn:first-child {
            border-top-left-radius: 10px !important;
            border-bottom-left-radius: 10px !important;
        }
        .btn-group .btn:last-child {
            border-top-right-radius: 10px !important;
            border-bottom-right-radius: 10px !important;
        }
    </style>
</body>
</html>
